<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Tracker — My Journey Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #07101f;
    --panel: #0e1b2e;
    --panel2: #162338;
    --border: rgba(59,130,246,0.18);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.15);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.12);
    --text: #e2eaf6;
    --muted: #7a94b8;
    --mono: 'Space Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Top bar */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 52px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  #topbar h1 {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue);
  }

  #topbar h1 span { color: var(--muted); }

  .stats-bar {
    display: flex;
    gap: 24px;
  }

  .stat { text-align: center; }
  .stat .val {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--amber);
  }
  .stat .lbl {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  #add-btn {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--blue-dim);
    border: 1px solid var(--blue);
    color: var(--blue);
    padding: 7px 16px;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: background 0.2s;
  }
  #add-btn:hover { background: rgba(59,130,246,0.28); }

  /* Main layout */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Map */
  #map-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #world-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Sidebar */
  #sidebar {
    width: 280px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  #flight-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .flight-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .flight-item:hover { background: var(--blue-dim); }
  .flight-item.highlighted { background: var(--amber-dim); }

  .flight-route {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .flight-route .arrow { color: var(--amber); font-size: 12px; }

  .flight-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    display: flex;
    gap: 12px;
  }

  .flight-delete {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    opacity: 0;
    transition: opacity 0.15s;
    padding: 4px;
  }
  .flight-item:hover .flight-delete { opacity: 1; }
  .flight-delete:hover { color: #ef4444; }

  .empty-state {
    padding: 40px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }
  .empty-state .big { font-size: 28px; margin-bottom: 12px; color: var(--border); font-family: var(--mono); }

  /* Modal */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(4,10,22,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }

  #modal {
    background: var(--panel2);
    border: 1px solid var(--border);
    width: 400px;
    padding: 28px;
  }

  #modal h2 {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 20px;
  }

  .form-row { margin-bottom: 16px; }

  .form-row label {
    display: block;
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-row input, .form-row select {
    width: 100%;
    background: var(--navy);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-row input:focus, .form-row select:focus { border-color: var(--blue); }
  .form-row input::placeholder { color: var(--muted); }

  .form-row select option { background: var(--panel2); }

  .form-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: flex-end;
  }

  .btn-cancel {
    font-family: var(--mono);
    font-size: 12px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 18px;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: border-color 0.2s;
  }
  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

  .btn-save {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--amber);
    border: 1px solid var(--amber);
    color: #07101f;
    padding: 8px 18px;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.88; }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: var(--panel2);
    border: 1px solid var(--border);
    padding: 8px 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 50;
    min-width: 160px;
  }
  #tooltip.visible { opacity: 1; }
  #tooltip .tt-route {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--amber);
  }
  #tooltip .tt-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* Map dot */
  .airport-dot { cursor: pointer; }
  .route-arc { cursor: pointer; }

  @keyframes dash-flow {
    to { stroke-dashoffset: -40; }
  }
  .arc-animated {
    animation: dash-flow 1.2s linear infinite;
  }
</style>
</head>

<div id="topbar">

    <div class="stat"><div class="val" id="stat-countries">0</div><div class="lbl">Countries</div></div>
  </div>
  <button id="add-btn" onclick="openModal()">+ Log Flight</button>
</div>

<div id="main">

          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>

          <feGaussianBlur stdDeviation="1.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <g id="land-layer"></g>
      <g id="routes-layer"></g>
      <g id="airports-layer"></g>
    </svg>
  </div>

  <div id="sidebar">
    <div id="sidebar-header">Flight log</div>
    <div id="flight-list">
      <div class="empty-state">
        <div class="big">✈</div>
        No flights logged yet.<br>Click <strong>+ Log Flight</strong> to add your first journey.
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Log a flight</h2>
    <div class="form-cols">
      <div class="form-row">
        <label>From (IATA)</label>
        <input id="f-from" type="text" placeholder="JFK" maxlength="4">
      </div>
      <div class="form-row">
        <label>To (IATA)</label>
        <input id="f-to" type="text" placeholder="LHR" maxlength="4">
      </div>
    </div>
    <div class="form-row">
      <label>Date</label>
      <input id="f-date" type="date">
    </div>
    <div class="form-cols">
      <div class="form-row">
        <label>Airline (optional)</label>
        <input id="f-airline" type="text" placeholder="BA">
      </div>
      <div class="form-row">
        <label>Flight no. (optional)</label>
        <input id="f-flightno" type="text" placeholder="BA117">
      </div>
    </div>
    <div class="form-row">
      <label>Class</label>
      <select id="f-class">
        <option value="Economy">Economy</option>
        <option value="Premium Economy">Premium Economy</option>
        <option value="Business">Business</option>
        <option value="First">First</option>
      </select>
    </div>
    <div id="modal-error" style="font-size:12px; color:#ef4444; margin-top:6px; display:none;"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveFlight()">Log Flight</button>
    </div>
  </div>
</div>

<div id="tooltip"></div>

// ─── Map projection (Mercator-ish) ────────────────────────────────────────────
function project(lat, lng) {
  const x = (lng + 180) / 360 * 1000;
  const latRad = lat * Math.PI / 180;
  const y = 250 - (Math.log(Math.tan(Math.PI/4 + latRad/2)) / Math.PI) * 230;
  return [x, y];
}

// ─── Great circle arc SVG path ────────────────────────────────────────────────
function arcPath(lat1, lng1, lat2, lng2) {
  const [x1,y1] = project(lat1, lng1);
  const [x2,y2] = project(lat2, lng2);
  const mx = (x1+x2)/2;
  const my = (y1+y2)/2;
  const dx = x2-x1, dy = y2-y1;
  const len = Math.sqrt(dx*dx+dy*dy);
  const cx = mx - dy * 0.25;
  const cy = my + dx * 0.25;
  return `M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}`;
}

// ─── Haversine distance ───────────────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.round(2 * R * Math.asin(Math.sqrt(a)));
}

// ─── Load world map GeoJSON ───────────────────────────────────────────────────
async function loadWorldMap() {
  try {
    const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const topo = await res.json();

    // Convert topojson to SVG paths using a tiny toposvg approach
    const countries = topo.objects.countries;
    const arcs = topo.arcs;

    function decodeArcs(arcIdxs) {
      const points = [];
      for (let arcIdx of arcIdxs) {
        let i = arcIdx, reversed = false;
        if (i < 0) { i = ~i; reversed = true; }
        const arc = arcs[i].slice();
        // Delta decode
        for (let j = 1; j < arc.length; j++) {
          arc[j][0] += arc[j-1][0];
          arc[j][1] += arc[j-1][1];
        }
        const pts = reversed ? arc.reverse() : arc;
        if (points.length) points.shift();
        points.push(...pts);
      }
      return points;
    }

    function rawToLatLng([x,y]) {
      return [y / topo.transform.scale[1] + topo.transform.translate[1],
              x / topo.transform.scale[0] + topo.transform.translate[0]];
    }

    // Actually use the scale/translate from topo
    const scale = topo.transform.scale;
    const translate = topo.transform.translate;

    function rawToSVG([rx, ry]) {
      const lng = rx * scale[0] + translate[0];
      const lat = ry * scale[1] + translate[1];
      return project(lat, lng);
    }

    const landLayer = document.getElementById('land-layer');

    for (const geom of countries.geometries) {
      const render = (rings) => {
        let d = '';
        for (const ring of rings) {
          const pts = decodeArcs(ring);
          if (!pts.length) continue;
          const svgPts = pts.map(rawToSVG);
          d += `M ${svgPts[0][0].toFixed(1)} ${svgPts[0][1].toFixed(1)} `;
          for (let i = 1; i < svgPts.length; i++) {
            d += `L ${svgPts[i][0].toFixed(1)} ${svgPts[i][1].toFixed(1)} `;
          }
          d += 'Z ';
        }
        const path = document.createElementNS('http://www.w3.org/2000/svg','path');
        path.setAttribute('d', d);
        path.setAttribute('fill', '#0d1e35');
        path.setAttribute('stroke', '#1d3455');
        path.setAttribute('stroke-width', '0.4');
        landLayer.appendChild(path);
      };

      if (geom.type === 'Polygon') render(geom.arcs);
      else if (geom.type === 'MultiPolygon') geom.arcs.forEach(render);
    }

  } catch(e) {
    // Fallback: simple background
    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x','0'); rect.setAttribute('y','0');
    rect.setAttribute('width','1000'); rect.setAttribute('height','500');
    rect.setAttribute('fill','#0a1525');
    document.getElementById('land-layer').appendChild(rect);
  }

  renderFlights();
}

// ─── Render all flights on map ────────────────────────────────────────────────
function renderFlights() {
  const routesLayer = document.getElementById('routes-layer');
  const airportsLayer = document.getElementById('airports-layer');
  routesLayer.innerHTML = '';
  airportsLayer.innerHTML = '';

  const visibleAirports = new Set();
  const tooltip = document.getElementById('tooltip');

  flights.forEach((f, idx) => {
    const fromAP = AIRPORTS[f.from];
    const toAP = AIRPORTS[f.to];
    if (!fromAP || !toAP) return;

    visibleAirports.add(f.from);
    visibleAirports.add(f.to);

    const isHighlighted = highlightedFlight === idx;
    const d = arcPath(fromAP.lat, fromAP.lng, toAP.lat, toAP.lng);
    const km = haversine(fromAP.lat, fromAP.lng, toAP.lat, toAP.lng);

    // Draw arc
    const arc = document.createElementNS('http://www.w3.org/2000/svg','path');
    arc.setAttribute('d', d);
    arc.setAttribute('fill', 'none');
    arc.setAttribute('stroke', isHighlighted ? '#f59e0b' : '#3b82f6');
    arc.setAttribute('stroke-width', isHighlighted ? '2' : '1.2');
    arc.setAttribute('stroke-dasharray', isHighlighted ? '8 4' : '4 4');
    arc.setAttribute('stroke-linecap', 'round');
    arc.setAttribute('opacity', isHighlighted ? '1' : '0.6');
    if (isHighlighted) {
      arc.classList.add('arc-animated');
      arc.setAttribute('filter','url(#glow-amber)');
    }
    arc.style.cursor = 'pointer';

    arc.addEventListener('mouseenter', (e) => {
      tooltip.innerHTML = `<div class="tt-route">${f.from} → ${f.to}</div><div class="tt-meta">${km.toLocaleString()} km · ${f.date || ''} · ${f.cls || ''}</div>`;
      tooltip.classList.add('visible');
    });
    arc.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    });
    arc.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
    arc.addEventListener('click', () => highlightFlight(idx));

    routesLayer.appendChild(arc);
  });

  // Draw airport dots
  visibleAirports.forEach(code => {
    const ap = AIRPORTS[code];
    if (!ap) return;
    const [x, y] = project(ap.lat, ap.lng);
    const tooltip = document.getElementById('tooltip');

    const g = document.createElementNS('http://www.w3.org/2000/svg','g');

    const outerCircle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    outerCircle.setAttribute('cx', x); outerCircle.setAttribute('cy', y);
    outerCircle.setAttribute('r', '5');
    outerCircle.setAttribute('fill', 'rgba(59,130,246,0.15)');
    outerCircle.setAttribute('stroke', '#3b82f6');
    outerCircle.setAttribute('stroke-width', '0.8');

    const innerCircle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    innerCircle.setAttribute('cx', x); innerCircle.setAttribute('cy', y);
    innerCircle.setAttribute('r', '2.2');
    innerCircle.setAttribute('fill', '#3b82f6');
    innerCircle.setAttribute('filter', 'url(#glow-blue)');

    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x', x + 7); label.setAttribute('y', y + 4);
    label.setAttribute('fill', '#7a94b8');
    label.setAttribute('font-size', '7');
    label.setAttribute('font-family', 'Space Mono, monospace');
    label.textContent = code;

    g.appendChild(outerCircle);
    g.appendChild(innerCircle);
    g.appendChild(label);

    g.addEventListener('mouseenter', (e) => {
      document.getElementById('tooltip').innerHTML = `<div class="tt-route">${code}</div><div class="tt-meta">${ap.n} · ${ap.c}, ${ap.co}</div>`;
      document.getElementById('tooltip').classList.add('visible');
    });
    g.addEventListener('mousemove', (e) => {
      document.getElementById('tooltip').style.left = (e.clientX+14)+'px';
      document.getElementById('tooltip').style.top = (e.clientY-10)+'px';
    });
    g.addEventListener('mouseleave', () => document.getElementById('tooltip').classList.remove('visible'));

    airportsLayer.appendChild(g);
  });

  updateStats();
  renderSidebar();
}

// ─── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const validFlights = flights.filter(f => AIRPORTS[f.from] && AIRPORTS[f.to]);
  const totalKm = validFlights.reduce((sum, f) => {
    const a = AIRPORTS[f.from], b = AIRPORTS[f.to];
    return sum + haversine(a.lat,a.lng,b.lat,b.lng);
  }, 0);
  const airports = new Set(validFlights.flatMap(f => [f.from, f.to]));
  const countries = new Set(validFlights.flatMap(f => {
    const res = [];
    if (AIRPORTS[f.from]) res.push(AIRPORTS[f.from].co);
    if (AIRPORTS[f.to]) res.push(AIRPORTS[f.to].co);
    return res;
  }));
  document.getElementById('stat-flights').textContent = flights.length;
  document.getElementById('stat-km').textContent = totalKm >= 1000 ? (totalKm/1000).toFixed(1)+'k' : totalKm;
  document.getElementById('stat-airports').textContent = airports.size;
  document.getElementById('stat-countries').textContent = countries.size;
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('flight-list');
  if (!flights.length) {
    list.innerHTML = '<div class="empty-state"><div class="big">✈</div>No flights logged yet.<br>Click <strong>+ Log Flight</strong> to add your first journey.</div>';
    return;
  }
  list.innerHTML = '';
  [...flights].reverse().forEach((f, revIdx) => {
    const idx = flights.length - 1 - revIdx;
    const fromAP = AIRPORTS[f.from];
    const toAP = AIRPORTS[f.to];
    const km = (fromAP && toAP) ? haversine(fromAP.lat,fromAP.lng,toAP.lat,toAP.lng).toLocaleString() + ' km' : '';
    const div = document.createElement('div');
    div.className = 'flight-item' + (highlightedFlight === idx ? ' highlighted' : '');
    div.innerHTML = `
      <div class="flight-route">
        <span>${f.from}</span>
        <span class="arrow">→</span>
        <span>${f.to}</span>
      </div>
      <div class="flight-meta">
        <span>${f.date || '—'}</span>
        <span>${km}</span>
        <span>${f.cls || ''}</span>
      </div>
      <button class="flight-delete" onclick="deleteFlight(${idx}, event)" title="Remove">✕</button>
    `;
    div.addEventListener('click', () => highlightFlight(idx));
    list.appendChild(div);
  });
}

function highlightFlight(idx) {
  highlightedFlight = highlightedFlight === idx ? null : idx;
  renderFlights();
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('f-from').value = '';
  document.getElementById('f-to').value = '';
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('f-airline').value = '';
  document.getElementById('f-flightno').value = '';
  document.getElementById('f-class').value = 'Economy';
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('f-from').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

function showError(msg) {
  const el = document.getElementById('modal-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function saveFlight() {
  const from = document.getElementById('f-from').value.trim().toUpperCase();
  const to = document.getElementById('f-to').value.trim().toUpperCase();
  const date = document.getElementById('f-date').value;
  const airline = document.getElementById('f-airline').value.trim();
  const flightno = document.getElementById('f-flightno').value.trim();
  const cls = document.getElementById('f-class').value;

  if (!from || !to) return showError('Please enter both departure and arrival airports.');
  if (!AIRPORTS[from]) return showError(`Unknown airport code: "${from}". Try a 3-letter IATA code like JFK, LHR, SIN.`);
  if (!AIRPORTS[to]) return showError(`Unknown airport code: "${to}". Try a 3-letter IATA code like JFK, LHR, SIN.`);
  if (from === to) return showError('Departure and arrival airports must be different.');

  flights.push({ from, to, date, airline, flightno, cls });
  localStorage.setItem('flight-tracker-v1', JSON.stringify(flights));
  closeModal();
  highlightedFlight = flights.length - 1;
  renderFlights();
}

function deleteFlight(idx, e) {
  e.stopPropagation();
  if (!confirm('Remove this flight?')) return;
  flights.splice(idx, 1);
  if (highlightedFlight === idx) highlightedFlight = null;
  else if (highlightedFlight > idx) highlightedFlight--;
  localStorage.setItem('flight-tracker-v1', JSON.stringify(flights));
  renderFlights();
}

// Enter key in modal
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) saveFlight();
});

// Input uppercase
['f-from','f-to','f-airline','f-flightno'].forEach(id => {
  document.getElementById(id).addEventListener('input', function() {
    const pos = this.selectionStart;
    this.value = this.value.toUpperCase();
    this.setSelectionRange(pos, pos);
  });
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadWorldMap();
</script>
